name: Review gate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, edited]
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]

permissions:
  contents: read
  pull-requests: read

jobs:
  review-gate:
    name: Review gate
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.1.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Pack workflow preflight
        run: >-
          pnpm workflow:preflight -- --branch "${{ github.event.pull_request.head.ref }}"
          --base-ref "${{ github.event.pull_request.base.ref }}"
          --repo "${{ github.repository }}"
          --head-repo "${{ github.event.pull_request.head.repo.full_name }}"

      - name: Check current-head review state
        run: >-
          pnpm review:gate -- --repo "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}"
          --strict-head-review --required-review-author chatgpt-codex-connector
          --wait-head-review-ms 180000 --poll-interval-ms 10000 --allow-missing-head-review
        env:
          GH_TOKEN: ${{ github.token }}
