name: Pack Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: pack-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Version, package, and release
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.1.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Prepare WXT types
        run: pnpm exec wxt prepare

      - name: Check formatting
        run: pnpm exec prettier --check .

      - name: Lint
        run: pnpm exec eslint . --max-warnings 0

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Build Chrome MV3 extension
        run: pnpm exec wxt build

      - name: Verify built package policy
        run: node scripts/verify-extension-package.mjs .output/chrome-mv3

      - name: Assert clean source tree before ZIP
        run: pnpm verify:clean

      - name: Create store ZIP
        run: pnpm exec wxt zip

      - name: Verify exact store ZIP
        run: xvfb-run --auto-servernum node scripts/verify-extension-zip.mjs

      - name: Write release provenance
        run: node scripts/write-release-provenance.mjs
        env:
          CWS_EXTENSION_ID: nfnbhekccajjfgkppolomflaeledoccb

      - name: Run Release Please
        id: release
        run: node scripts/run-release-please.mjs
        env:
          RELEASE_PLEASE_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_GRAPHQL_URL: ${{ github.graphql_url }}

      - name: Mark v0 GitHub release as prerelease
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: gh release edit "${{ steps.release.outputs.tag_name }}" --prerelease
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload verified release assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: >-
          gh release upload "${{ steps.release.outputs.tag_name }}"
          .output/*chrome.zip
          .output/complyeazepack-*-chrome.zip.sha256
          .output/pack-release-provenance.v1.json
          --clobber
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify uploaded GitHub release assets
        if: ${{ steps.release.outputs.release_created == 'true' }}
        run: >-
          node scripts/verify-github-release-assets.mjs
          --tag "${{ steps.release.outputs.tag_name }}"
          --zip .output/*chrome.zip
          --checksum .output/complyeazepack-*-chrome.zip.sha256
          --provenance .output/pack-release-provenance.v1.json
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

  chrome-web-store:
    name: Submit Chrome Web Store package
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' && vars.CWS_SUBMIT_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    environment: chrome-web-store
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22.13.0

      - name: Download verified release package
        run: >-
          gh release download "${{ needs.release.outputs.tag_name }}"
          --pattern "*chrome.zip"
          --pattern "*.sha256"
          --pattern "pack-release-provenance.v1.json"
          --dir .release
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify downloaded release package
        run: >-
          node scripts/verify-github-release-assets.mjs
          --tag "${{ needs.release.outputs.tag_name }}"
          --zip .release/*chrome.zip
          --checksum .release/*.sha256
          --provenance .release/pack-release-provenance.v1.json
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Submit to Chrome Web Store
        run: node scripts/publish-chrome-web-store.mjs --zip .release/*chrome.zip
        env:
          CWS_EXTENSION_ID: nfnbhekccajjfgkppolomflaeledoccb
          CWS_PUBLISHER_ID: ${{ vars.CWS_PUBLISHER_ID }}
          CWS_SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
