name: Pack CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Verify extension
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271
        with:
          version: 11.1.2

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020
        with:
          node-version: 22.13.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install pinned Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Audit dependencies
        run: pnpm audit --audit-level high

      - name: Prepare WXT types
        run: pnpm exec wxt prepare

      - name: Check formatting
        run: pnpm exec prettier --check .

      - name: Lint
        run: pnpm exec eslint . --max-warnings 0

      - name: Type-check
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm exec vitest run

      - name: Build Chrome MV3 extension
        run: pnpm exec wxt build

      - name: Verify built package policy
        run: node scripts/verify-extension-package.mjs .output/chrome-mv3

      - name: Create store zip
        run: pnpm exec wxt zip

      - name: Verify exact store zip
        run: xvfb-run --auto-servernum node scripts/verify-extension-zip.mjs

      - name: Write ZIP checksum artifact
        run: |
          shasum -a 256 .output/*chrome.zip > .output/complyeazepack-chrome.zip.sha256
          cat .output/complyeazepack-chrome.zip.sha256
