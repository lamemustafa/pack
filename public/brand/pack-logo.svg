<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 320" role="img" aria-labelledby="pack-logo-title pack-logo-desc">
  <title id="pack-logo-title">Pack by ComplyEaze logo</title>
  <desc id="pack-logo-desc">A flat document and download mark beside the Pack wordmark, with ComplyEaze set in the primary brand blue.</desc>
  <defs>
    <linearGradient id="download-blue" x1="214" y1="178" x2="326" y2="290" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2F80ED"/>
      <stop offset="1" stop-color="#1556D8"/>
    </linearGradient>
    <style>
      .document-stroke { stroke: #A9CBF7; stroke-width: 3; }
      .copy-line { fill: #BCD8FB; }
      .pack-word { fill: #061943; font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 148px; font-weight: 700; letter-spacing: 1.5px; }
      .by-word { fill: #5F6F82; font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 48px; font-weight: 500; letter-spacing: 0; }
      .brand-word { fill: #2F80ED; font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 50px; font-weight: 700; letter-spacing: 0; }
    </style>
  </defs>

  <g id="document-download-mark">
    <rect x="44" y="77" width="192" height="222" rx="24" transform="rotate(-4 140 188)" fill="#E4F0FF" stroke="#7DB2F5" stroke-width="3"/>
    <rect x="77" y="51" width="204" height="238" rx="25" fill="#FFFFFF" class="document-stroke"/>
    <path d="M217 51v48c0 14 11 25 25 25h39z" fill="#C7DFFF" stroke="#9EC3F5" stroke-width="2"/>
    <rect x="117" y="127" width="94" height="10" rx="5" class="copy-line"/>
    <rect x="117" y="166" width="150" height="10" rx="5" class="copy-line"/>
    <rect x="117" y="205" width="150" height="10" rx="5" class="copy-line"/>
    <rect x="117" y="244" width="78" height="10" rx="5" class="copy-line"/>
    <circle cx="270" cy="242" r="57" fill="url(#download-blue)"/>
    <path d="M270 206v51" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <path d="M248 240l22 22 23-22" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M238 274h64" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g id="pack-wordmark">
    <text class="pack-word" x="344" y="166">Pack</text>
    <text class="by-word" x="349" y="238">by</text>
    <text class="brand-word" x="425" y="238">ComplyEaze</text>
  </g>
</svg>
