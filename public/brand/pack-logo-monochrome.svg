<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 320" role="img" aria-labelledby="pack-logo-mono-title pack-logo-mono-desc">
  <title id="pack-logo-mono-title">Pack by ComplyEaze monochrome logo</title>
  <desc id="pack-logo-mono-desc">A monochrome Pack by ComplyEaze lockup for single-color dark use on light backgrounds.</desc>
  <defs>
    <style>
      .ink { fill: #061943; }
      .line { fill: none; stroke: #061943; stroke-width: 3; }
      .knockout { fill: #FFFFFF; }
      .pack-word { fill: #061943; font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 148px; font-weight: 700; letter-spacing: 1.5px; }
      .by-word { fill: #061943; font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 48px; font-weight: 500; letter-spacing: 0; }
      .brand-word { fill: #061943; font-family: "Avenir Next", "Helvetica Neue", Arial, sans-serif; font-size: 50px; font-weight: 700; letter-spacing: 0; }
    </style>
  </defs>

  <g id="document-download-mark">
    <rect x="44" y="77" width="192" height="222" rx="24" transform="rotate(-4 140 188)" class="line"/>
    <rect x="77" y="51" width="204" height="238" rx="25" class="line"/>
    <path d="M217 51v48c0 14 11 25 25 25h39z" class="line"/>
    <rect x="117" y="127" width="94" height="10" rx="5" class="ink" opacity="0.35"/>
    <rect x="117" y="166" width="150" height="10" rx="5" class="ink" opacity="0.35"/>
    <rect x="117" y="205" width="150" height="10" rx="5" class="ink" opacity="0.35"/>
    <rect x="117" y="244" width="78" height="10" rx="5" class="ink" opacity="0.35"/>
    <circle cx="270" cy="242" r="57" class="ink"/>
    <path d="M270 206v51" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
    <path d="M248 240l22 22 23-22" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M238 274h64" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g id="pack-wordmark">
    <text class="pack-word" x="344" y="166">Pack</text>
    <text class="by-word" x="349" y="238">by</text>
    <text class="brand-word" x="425" y="238">ComplyEaze</text>
  </g>
</svg>
